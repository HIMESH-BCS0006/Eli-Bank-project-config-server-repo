server.port = 8081


spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://localhost:3306/elibank-user-DB?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Himebw115

#jpa vendor adapter configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true


##Eureka server clinet kathawa
eureka.client.service-url.defaultZone=http://localhost:8761/eureka

# Send traces to Zipkin
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Sample 100% of requests (1.0 = 100%)
management.tracing.sampling.probability=1.0
spring.cloud.openfeign.micrometer.enabled=true

# Propagation type (default is B3, but confirm)
management.tracing.propagation.type=b3_multi
# or use b3 (single header)

# Expose all actuator endpoints
management.endpoints.web.exposure.include=*
# Show detailed info in health
management.endpoint.health.show-details=always

