##Eureka server clinet kathawa
eureka.client.service-url.defaultZone=http://eureka.elibank.internal:8761/eureka
spring.jpa.hibernate.ddl-auto=validate


# Send traces to Zipkin
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans

# Sample 100% of requests (1.0 = 100%)
management.tracing.sampling.probability=1.0

#Actuator endpoint for the circuit breaker
management.health.circuitbreakers.enabled=true
#management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Circuit Breaker configurations
resilience4j.circuitbreaker.instances.taskServiceCircuitBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.taskServiceCircuitBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.taskServiceCircuitBreaker.minimum-number-of-calls=5
resilience4j.circuitbreaker.instances.taskServiceCircuitBreaker.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.instances.taskServiceCircuitBreaker.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.instances.taskServiceCircuitBreaker.permitted-number-of-calls-in-half-open-state=3
#mulu request gaana a10 unama eken failure rate ek ganna
resilience4j.circuitbreaker.instances.taskServiceCircuitBreaker.sliding-window-size=10
# we can get count based or time based but we choosed count based!!
resilience4j.circuitbreaker.instances.taskServiceCircuitBreaker.sliding-window-type=count_based

